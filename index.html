<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאי-לי יושבת בסיר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Varela+Round&display=swap');
        
        body {
            font-family: 'Varela Round', 'Assistant', sans-serif;
            background-color: #e2e8f0; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: none;
        }

        .book-container {
            perspective: 2000px;
            width: 90vw;
            max-width: 420px;
            height: 75vh;
            max-height: 700px;
            position: relative;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            right: 0;
            transform-origin: right center;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
            user-select: none;
            background: white;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            border-radius: 16px 4px 4px 16px;
            box-shadow: -10px 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            backface-visibility: hidden;
            border: 1px solid #d1d5db;
        }

        .page.flipped {
            transform: rotateY(180deg);
        }

        .page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            width: 100%;
            height: 90%;
        }

        .text-content {
            font-size: 1.9rem;
            line-height: 1.35;
            color: #1e293b;
            font-weight: 700;
            margin-top: auto;
            padding-bottom: 10px;
        }

        .highlight {
            color: #2563eb;
            display: inline-block;
        }

        /* מסגרת מרובעת עם פינות מעוגלות - מותאם למילוי מלא */
        .illustration-container {
            width: 280px; /* גודל מותאם אישית */
            height: 280px;
            background-color: #ffffff;
            border-radius: 32px; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 6px solid white;
            margin-bottom: auto;
            overflow: hidden; 
            position: relative;
        }

        .illustration-container img {
            width: 100%;
            height: 100%;
            /* 'cover' מבטיח שהתמונה תמלא את כל הריבוע ללא רווחים, 
               מכיוון שהמקור ריבועי והיעד ריבועי - לא תהיה מתיחה או חיתוך משמעותי */
            object-fit: cover; 
            display: block;
        }

        .fallback-icon {
            font-size: 8rem;
            display: none;
        }

        .show-fallback .fallback-icon {
            display: block;
        }
        .show-fallback img {
            display: none;
        }

        .cover {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            border: none;
            z-index: 100;
        }

        .cover .text-content {
            color: white;
            font-size: 2.6rem;
            text-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        .cover .illustration-container {
            background: #ffffff; /* רקע לבן נקי לתמונה */
            border: 4px solid rgba(255, 255, 255, 0.5);
        }

        .restart-btn {
            background: #2563eb;
            color: white;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.3rem;
            border: 3px solid white;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .restart-btn.show {
            opacity: 1;
            visibility: visible;
        }

        .controls {
            width: 100%;
            max-width: 480px;
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
        }

        .nav-btn {
            background: #ffffff;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            cursor: pointer;
        }

        .nav-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
            margin: 0 2px;
        }

        .dot.active {
            background: #2563eb;
            transform: scale(1.3);
        }
    </style>
</head>
<body>

    <audio id="pageFlipSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3" type="audio/mpeg">
    </audio>

    <div class="book-container">
        <div class="book" id="book"></div>
    </div>

    <div class="controls">
        <button class="nav-btn" id="prevBtn">
            <span style="font-size: 1.8rem;">➡️</span>
            <span style="font-size: 0.8rem; font-weight: 800;">אחורה</span>
        </button>
        <div style="display: flex;" id="dotCounter"></div>
        <button class="nav-btn" id="nextBtn">
            <span style="font-size: 1.8rem;">⬅️</span>
            <span style="font-size: 0.8rem; font-weight: 800;">קדימה</span>
        </button>
    </div>

    <script>
        const coverImg = "https://github.com/user-attachments/assets/c8e79c2e-2d28-4301-9dfd-643bf8c9730a";

        const pagesData = [
            { text: "מאי-לי יושבת בסיר", image: coverImg, isCover: true },
            { text: "קוראים לי מאי-לי ואני ילדה <span class='highlight'>גדולה</span>", icon: "👧" },
            { text: "אוכלת <span class='highlight'>לבד</span>", icon: "🥣" },
            { text: "מרכיבה פאזל", icon: "🧩" },
            { text: "ולומדת לעשות פיפי וקקי ב<span class='highlight'>סיר</span>!", icon: "✨" },
            { text: "אומרת <span class='highlight'>ביי ביי</span> לחיתול ולובשת תחתונים", icon: "🩲" },
            { text: "כשלוחץ לי בבטן אני יושבת בסיר", icon: "💡" },
            { text: "אני יושבת ומחכה, לפעמים קוראת ספר", icon: "📚" },
            { text: "לפעמים יוצא <span class='highlight'>פיפי</span> או <span class='highlight'>קקי</span> בסיר", icon: "⭐" },
            { text: "אני שוטפת ידיים עם מים וסבון", icon: "🧼" },
            { text: "כיף להיות ילדה <span class='highlight'>גדולה</span>", icon: "💖", isLast: true }
        ];

        const book = document.getElementById('book');
        const dotCounter = document.getElementById('dotCounter');
        const pageFlipSound = document.getElementById('pageFlipSound');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        let currentPage = 0;

        function handleImageError(img) {
            img.closest('.illustration-container').classList.add('show-fallback');
        }

        pagesData.forEach((data, index) => {
            const dot = document.createElement('div');
            dot.className = `dot ${index === 0 ? 'active' : ''}`;
            dotCounter.appendChild(dot);

            const pageDiv = document.createElement('div');
            pageDiv.className = `page ${data.isCover ? 'cover' : ''}`;
            pageDiv.style.zIndex = pagesData.length - index;
            
            const content = `
                <div class="page-content">
                    <div class="illustration-container ${!data.image ? 'show-fallback' : ''}">
                        ${data.image ? `<img src="${data.image}" onerror="handleImageError(this)">` : ''}
                        <span class="fallback-icon">${data.icon || '📖'}</span>
                    </div>
                    <div class="text-content">${data.text}</div>
                    ${data.isLast ? '<button class="restart-btn" id="restartBtn">🔄 התחל מחדש</button>' : ''}
                </div>
            `;
            pageDiv.innerHTML = content;
            pageDiv.onclick = () => { if(index === currentPage) goNext(); };
            book.appendChild(pageDiv);
        });

        const pageElements = document.querySelectorAll('.page');
        const dots = document.querySelectorAll('.dot');

        function updateUI() {
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentPage));
            prevBtn.classList.toggle('disabled', currentPage === 0);
            nextBtn.classList.toggle('disabled', currentPage === pagesData.length - 1);
            const restartBtn = document.getElementById('restartBtn');
            if(restartBtn) restartBtn.classList.toggle('show', currentPage === pagesData.length - 1);
        }

        function goNext() {
            if (currentPage < pagesData.length - 1) {
                pageFlipSound.currentTime = 0;
                pageFlipSound.play().catch(() => {});
                pageElements[currentPage].classList.add('flipped');
                currentPage++;
                updateUI();
            }
        }

        function goPrev() {
            if (currentPage > 0) {
                currentPage--;
                pageElements[currentPage].classList.remove('flipped');
                updateUI();
            }
        }

        nextBtn.onclick = goNext;
        prevBtn.onclick = goPrev;
        document.addEventListener('click', e => {
            if(e.target.id === 'restartBtn') {
                pageElements.forEach(p => p.classList.remove('flipped'));
                currentPage = 0;
                updateUI();
            }
        });
    </script>
</body>
</html>
