<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מאי-לי יושבת בסיר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Varela+Round&display=swap');
        
        :root {
            --deep-purple-blue: #1e1b4b; 
            --gradient-start: #312e81; 
            --gradient-end: #1e1b4b;
            --led-purple: #8b5cf6;
        }

        body {
            font-family: 'Varela Round', 'Assistant', sans-serif;
            /* הרקע הכהה קבוע עכשיו לכל אורך האפליקציה */
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 10px;
            touch-action: none;
        }

        .book-container {
            perspective: 2000px;
            width: 95vw;
            max-width: 420px;
            height: 65vh; 
            max-height: 600px;
            position: relative;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            right: 0;
            transform-origin: right center;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
            user-select: none;
            background: white;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            border-radius: 12px 4px 4px 12px;
            box-shadow: -5px 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            backface-visibility: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page.flipped {
            transform: rotateY(180deg);
        }

        .page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            width: 100%;
            height: 100%;
        }

        .text-content {
            font-size: clamp(1.4rem, 5vw, 1.8rem); 
            line-height: 1.3;
            color: #1e293b;
            font-weight: 700;
            margin-top: auto;
            padding-bottom: 5px;
        }

        .highlight {
            color: var(--led-purple);
            display: inline-block;
        }

        .illustration-container {
            width: clamp(180px, 55vw, 280px);
            height: clamp(180px, 55vw, 280px);
            background-color: #ffffff;
            border-radius: 24px; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 4px solid white;
            margin-bottom: auto;
            overflow: hidden; 
            position: relative;
        }

        .illustration-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .fallback-icon {
            font-size: clamp(4rem, 15vw, 7rem);
            display: none;
        }

        .show-fallback .fallback-icon {
            display: block;
        }
        .show-fallback img {
            display: none;
        }

        /* דף הכריכה */
        .cover {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            border: none;
            z-index: 100;
        }

        .cover .text-content {
            color: white;
            font-size: clamp(2rem, 8vw, 2.5rem);
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* כפתורי ניווט מותאמים לרקע הכהה הקבוע */
        .controls {
            width: 100%;
            max-width: 420px;
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 18px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            color: var(--deep-purple-blue);
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:not(.disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
            background: white;
        }

        .nav-btn.disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        .page-counter {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            color: white;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 3px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--led-purple);
            width: 14px;
            border-radius: 4px;
            box-shadow: 0 0 8px var(--led-purple);
        }

        .restart-btn {
            background: var(--led-purple);
            color: white;
            padding: 10px 22px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .restart-btn.show {
            opacity: 1;
            visibility: visible;
        }

        @media (max-height: 600px) {
            .book-container { height: 55vh; }
            .illustration-container { width: 170px; height: 170px; }
            .text-content { font-size: 1.2rem; }
            .controls { margin-top: 15px; }
        }
    </style>
</head>
<body>

    <audio id="pageFlipSound" preload="auto"></audio>

    <div class="book-container">
        <div class="book" id="book"></div>
    </div>

    <div class="controls">
        <button class="nav-btn" id="prevBtn">
            <span class="icon">👉</span>
            <span>אחורה</span>
        </button>

        <div class="page-counter" id="dotCounter"></div>

        <button class="nav-btn" id="nextBtn">
            <span>קדימה</span>
            <span class="icon">👈</span>
        </button>
    </div>

    <script>
        const coverImg = "https://github.com/user-attachments/assets/c8e79c2e-2d28-4301-9dfd-643bf8c9730a";
        const flipSoundUrl = "https://www.soundjay.com/misc/sounds/page-flip-01a.mp3";

        const pagesData = [
            { text: "מאי-לי יושבת בסיר", image: coverImg, isCover: true },
            { text: "קוראים לי מאי-לי ואני ילדה <span class='highlight'>גדולה</span>", icon: "👧" },
            { text: "אוכלת <span class='highlight'>לבד</span>", icon: "🥣" },
            { text: "מרכיבה פאזל", icon: "🧩" },
            { text: "ולומדת לעשות פיפי וקקי ב<span class='highlight'>סיר</span>!", icon: "✨" },
            { text: "אומרת <span class='highlight'>ביי ביי</span> לחיתול ולובשת תחתונים", icon: "🩲" },
            { text: "כשלוחץ לי בבטן אני יושבת בסיר", icon: "💡" },
            { text: "אני יושבת ומחכה, לפעמים קוראת ספר", icon: "📚" },
            { text: "לפעמים יוצא <span class='highlight'>פיפי</span> או <span class='highlight'>קקי</span> בסיר", icon: "⭐" },
            { text: "אני שוטפת ידיים עם מים וסבון", icon: "🧼" },
            { text: "כיף להיות ילדה <span class='highlight'>גדולה</span>", icon: "💖", isLast: true }
        ];

        const book = document.getElementById('book');
        const dotCounter = document.getElementById('dotCounter');
        const pageFlipSound = document.getElementById('pageFlipSound');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        let currentPage = 0;

        pageFlipSound.src = flipSoundUrl;

        function handleImageError(img) {
            img.closest('.illustration-container').classList.add('show-fallback');
        }

        pagesData.forEach((data, index) => {
            const dot = document.createElement('div');
            dot.className = `dot ${index === 0 ? 'active' : ''}`;
            dotCounter.appendChild(dot);

            const pageDiv = document.createElement('div');
            pageDiv.className = `page ${data.isCover ? 'cover' : ''}`;
            pageDiv.style.zIndex = pagesData.length - index;
            
            const content = `
                <div class="page-content">
                    <div class="illustration-container ${!data.image ? 'show-fallback' : ''}">
                        ${data.image ? `<img src="${data.image}" onerror="handleImageError(this)">` : ''}
                        <span class="fallback-icon">${data.icon || '📖'}</span>
                    </div>
                    <div class="text-content">${data.text}</div>
                    ${data.isLast ? '<button class="restart-btn" id="restartBtn">🔄 התחל מחדש</button>' : ''}
                </div>
            `;
            pageDiv.innerHTML = content;
            pageDiv.onclick = () => { if(index === currentPage) goNext(); };
            book.appendChild(pageDiv);
        });

        const pageElements = document.querySelectorAll('.page');
        const dots = document.querySelectorAll('.dot');

        function updateUI() {
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentPage);
            });
            prevBtn.classList.toggle('disabled', currentPage === 0);
            nextBtn.classList.toggle('disabled', currentPage === pagesData.length - 1);
            const restartBtn = document.getElementById('restartBtn');
            if(restartBtn) restartBtn.classList.toggle('show', currentPage === pagesData.length - 1);
        }

        function goNext() {
            if (currentPage < pagesData.length - 1) {
                pageFlipSound.currentTime = 0;
                pageFlipSound.play().catch(() => {});
                pageElements[currentPage].classList.add('flipped');
                currentPage++;
                updateUI();
            }
        }

        function goPrev() {
            if (currentPage > 0) {
                currentPage--;
                pageElements[currentPage].classList.remove('flipped');
                updateUI();
            }
        }

        nextBtn.onclick = goNext;
        prevBtn.onclick = goPrev;
        document.addEventListener('click', e => {
            if(e.target.id === 'restartBtn') {
                pageElements.forEach(p => p.classList.remove('flipped'));
                currentPage = 0;
                updateUI();
            }
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) goNext(); 
            if (touchEndX - touchStartX > 50) goPrev(); 
        });
    </script>
</body>
</html>
