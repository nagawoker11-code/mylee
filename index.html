<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאי-לי יושבת בסיר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Varela+Round&display=swap');
        
        body {
            font-family: 'Varela Round', 'Assistant', sans-serif;
            background-color: #e2e8f0; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: none;
        }

        .book-container {
            perspective: 2000px;
            width: 90vw;
            max-width: 420px;
            height: 75vh;
            max-height: 700px;
            position: relative;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            right: 0;
            transform-origin: right center;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
            user-select: none;
            background: white;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            border-radius: 16px 4px 4px 16px;
            box-shadow: -10px 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            backface-visibility: hidden;
            border: 1px solid #d1d5db;
        }

        .page.flipped {
            transform: rotateY(180deg);
        }

        .page::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 15px;
            height: 100%;
            background: linear-gradient(to left, rgba(0,0,0,0.05), transparent);
            pointer-events: none;
        }

        .page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            width: 100%;
            height: 90%;
        }

        .text-content {
            font-size: 1.9rem;
            line-height: 1.35;
            color: #1e293b;
            font-weight: 700;
            margin-top: auto;
            padding-bottom: 10px;
        }

        .highlight {
            color: #2563eb;
            display: inline-block;
            transition: transform 0.3s;
        }
        
        .highlight:active {
            transform: scale(1.2);
        }

        .illustration-container {
            width: 230px;
            height: 230px;
            background-color: #f0f9ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            border: 6px solid white;
            margin-bottom: auto;
            transition: transform 0.5s ease;
        }

        .illustration-container:active {
            transform: scale(1.1) rotate(5deg);
        }

        .cover {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            border: none;
            z-index: 100;
        }

        .cover .text-content {
            color: white;
            font-size: 2.6rem;
            text-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        .cover .illustration-container {
            background: rgba(255, 255, 255, 0.25);
            border: 4px solid rgba(255, 255, 255, 0.4);
        }

        /* Updated Restart Button Styles: Hidden by default */
        .restart-btn {
            margin-top: 15px;
            background: #2563eb;
            color: white;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.3rem;
            border: 3px solid white;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
        }

        .restart-btn.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .restart-btn:active {
            transform: scale(0.9);
            box-shadow: 0 4px 8px rgba(37, 99, 235, 0.4);
        }

        .controls {
            width: 100%;
            max-width: 480px;
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
        }

        .nav-btn {
            background: #ffffff;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            color: #1e293b;
            border: 2px solid #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:active {
            transform: scale(0.9);
            background-color: #f1f5f9;
        }

        .nav-btn.disabled {
            opacity: 0.3;
            filter: grayscale(1);
            pointer-events: none;
        }

        .page-counter {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
            transition: all 0.3s;
        }

        .dot.active {
            background: #2563eb;
            transform: scale(1.3);
        }

        @media (max-width: 400px) {
            .illustration-container { width: 190px; height: 190px; font-size: 6rem; }
            .text-content { font-size: 1.6rem; }
            .nav-btn { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>

    <audio id="pageFlipSound" preload="auto" crossorigin="anonymous">
        <source src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3" type="audio/mpeg">
    </audio>

    <div class="book-container" id="container">
        <div class="book" id="book">
            <!-- Pages will be generated here -->
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" id="prevBtn">
            <span class="icon" style="font-size: 1.8rem;">➡️</span>
            <span class="label" style="font-size: 0.8rem; font-weight: 800;">אחורה</span>
        </button>

        <div class="page-counter" id="dotCounter"></div>

        <button class="nav-btn" id="nextBtn">
            <span class="icon" style="font-size: 1.8rem;">⬅️</span>
            <span class="label" style="font-size: 0.8rem; font-weight: 800;">קדימה</span>
        </button>
    </div>

    <script>
        const pagesData = [
            { text: "מאי-לי יושבת בסיר", icon: "👑", isCover: true, bgColor: "#eff6ff" },
            { text: "קוראים לי מאי-לי ואני ילדה <span class='highlight'>גדולה</span>", icon: "👧", bgColor: "#fff" },
            { text: "אוכלת <span class='highlight'>לבד</span>", icon: "🥣", bgColor: "#fff7ed" },
            { text: "מרכיבה פאזל", icon: "🧩", bgColor: "#f0fdf4" },
            { text: "ולומדת לעשות פיפי וקקי ב<span class='highlight'>סיר</span>!", icon: "✨", bgColor: "#fdf2f8" },
            { text: "אומרת <span class='highlight'>ביי ביי</span> לחיתול ולובשת תחתונים", icon: "🩲", bgColor: "#fff" },
            { text: "כשלוחץ לי בבטן אני יושבת בסיר", icon: "💡", bgColor: "#fefce8" },
            { text: "אני יושבת ומחכה, לפעמים קוראת ספר", icon: "📚", bgColor: "#fff" },
            { text: "לפעמים יוצא <span class='highlight'>פיפי</span> או <span class='highlight'>קקי</span> בסיר", icon: "⭐", bgColor: "#f5f3ff" },
            { text: "אני שוטפת ידיים עם מים וסבון", icon: "🧼", bgColor: "#ecfeff" },
            { text: "כיף להיות ילדה <span class='highlight'>גדולה</span>", icon: "💖", bgColor: "#fff", isLast: true }
        ];

        const book = document.getElementById('book');
        const dotCounter = document.getElementById('dotCounter');
        const pageFlipSound = document.getElementById('pageFlipSound');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        let currentPage = 0;
        const totalPages = pagesData.length;

        let audioInitialized = false;
        function initAudio() {
            if (!audioInitialized) {
                pageFlipSound.play().then(() => {
                    pageFlipSound.pause();
                    pageFlipSound.currentTime = 0;
                }).catch(() => {});
                audioInitialized = true;
            }
        }

        function playFlipSound() {
            initAudio();
            pageFlipSound.currentTime = 0;
            pageFlipSound.play().catch(e => {});
        }

        // Generate Dots
        for (let i = 0; i < totalPages; i++) {
            const dot = document.createElement('div');
            dot.className = `dot ${i === 0 ? 'active' : ''}`;
            dotCounter.appendChild(dot);
        }

        // Generate Pages
        pagesData.forEach((data, index) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = `page ${data.isCover ? 'cover' : ''}`;
            pageDiv.style.zIndex = totalPages - index;
            if(!data.isCover) pageDiv.style.backgroundColor = data.bgColor;
            
            let contentHtml = `
                <div class="page-content">
                    <div class="illustration-container">${data.icon}</div>
                    <div class="text-content">${data.text}</div>
                    ${data.isLast ? '<button class="restart-btn" id="restartBtn">🔄 התחל מחדש</button>' : ''}
                </div>
            `;
            
            pageDiv.innerHTML = contentHtml;
            
            pageDiv.onclick = (e) => {
                if (e.target.id === 'restartBtn') return;
                if (index === currentPage) goNext();
                else if (index === currentPage - 1) goPrev();
            };

            book.appendChild(pageDiv);
        });

        const pageElements = document.querySelectorAll('.page');
        const dots = document.querySelectorAll('.dot');
        const restartBtn = document.getElementById('restartBtn');

        function updateUI() {
            dots.forEach((dot, i) => {
                dot.className = `dot ${i === currentPage ? 'active' : ''}`;
            });
            
            prevBtn.classList.toggle('disabled', currentPage === 0);
            nextBtn.classList.toggle('disabled', currentPage === totalPages - 1);

            // Logic to show/hide restart button ONLY on last page
            if (currentPage === totalPages - 1) {
                setTimeout(() => {
                   if (restartBtn) restartBtn.classList.add('show');
                }, 800); // Wait for page flip to almost finish
            } else {
                if (restartBtn) restartBtn.classList.remove('show');
            }
        }

        function goNext() {
            if (currentPage < totalPages - 1) {
                playFlipSound();
                pageElements[currentPage].classList.add('flipped');
                currentPage++;
                updateUI();
            }
        }

        function goPrev() {
            if (currentPage > 0) {
                playFlipSound();
                currentPage--;
                pageElements[currentPage].classList.remove('flipped');
                updateUI();
            }
        }

        function restartBook() {
            playFlipSound();
            // Hide button immediately when restarting
            if (restartBtn) restartBtn.classList.remove('show');
            
            const flippedPages = Array.from(pageElements).filter(p => p.classList.contains('flipped')).reverse();
            flippedPages.forEach((page, i) => {
                setTimeout(() => {
                    page.classList.remove('flipped');
                }, i * 80);
            });
            currentPage = 0;
            updateUI();
        }

        nextBtn.onclick = goNext;
        prevBtn.onclick = goPrev;
        
        document.addEventListener('click', (e) => {
            if (e.target.id === 'restartBtn') restartBook();
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            initAudio();
        }, {passive: true});

        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) goNext(); 
            if (touchEndX - touchStartX > 50) goPrev(); 
        }, {passive: true});

        updateUI();
    </script>
</body>
</html>
