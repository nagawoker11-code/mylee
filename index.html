<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מאי-לי יושבת בסיר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Varela Round', 'Assistant', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        .book-container {
            perspective: 2000px;
            width: 85vw;
            height: 70vh;
            max-width: 400px;
            max-height: 600px;
            position: relative;
            margin: auto;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            right: 0;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            backface-visibility: hidden;
            transform-origin: right center;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1), z-index 0.8s;
            overflow: hidden;
            border: 1px solid #f0f0f0;
        }

        .page.flipped {
            transform: rotateY(180deg);
            z-index: 0 !important;
        }

        .page:not(.flipped) {
            z-index: 10;
        }

        .text-container {
            flex-shrink: 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 1rem;
        }

        .image-frame {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #ffffff;
            border: 6px solid #fff;
            border-radius: 40px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05), 0 5px 15px rgba(0,0,0,0.08);
            width: 100%;
            position: relative;
        }

        .page-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 2.5rem;
            padding: 1.5rem 0;
            z-index: 100;
        }

        .nav-btn {
            width: 68px;
            height: 68px;
            background: #6366f1;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
            border: none;
            outline: none;
        }

        .nav-btn:active {
            transform: scale(0.9);
        }

        /* Arrows direction fix */
        .prev-btn svg { transform: scaleX(-1); } /* Mirror arrow for previous in RTL */
        .next-btn svg { transform: scaleX(-1); } /* Mirror arrow for next in RTL */

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d5db;
            margin: 0 3px;
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: #6366f1;
            transform: scale(1.4);
        }

        @media (max-height: 650px) {
            .book-container { height: 60vh; }
            .text-container h2 { font-size: 1.15rem; }
        }
    </style>
</head>
<body>

    <div id="progressContainer" class="flex mb-4"></div>

    <div class="book-container">
        <div id="book" class="book"></div>
    </div>

    <div class="controls">
        <!-- Prev Button (Left side) -->
        <button id="prevBtn" class="nav-btn prev-btn opacity-30 pointer-events-none" aria-label="הקודם">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
            </svg>
        </button>

        <!-- Next Button (Right side) -->
        <button id="nextBtn" class="nav-btn next-btn" aria-label="הבא">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
            </svg>
        </button>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>

    <script>
        const audioBase = "https://raw.githubusercontent.com/nagawoker11-code/mylee/main/";
        
        const bookData = [
            { text: "מאי-לי יושבת בסיר", image: "https://github.com/user-attachments/assets/c8e79c2e-2d28-4301-9dfd-643bf8c9730a", audio: null },
            { text: "קוראים לי מאי-לי ואני ילדה גדולה שעושה דברים של ילדים גדולים", image: "https://github.com/nagawoker11-code/mylee/blob/main/ML-2.jpeg?raw=true", audio: "ML-A.mp3" },
            { text: "אוכלת לבד", image: "https://github.com/nagawoker11-code/mylee/blob/main/ML-3.jpeg?raw=true", audio: "ML-B.mp3" },
            { text: "מרכיבה פאזל", image: "https://github.com/nagawoker11-code/mylee/blob/main/ML-4.jpeg?raw=true", audio: "ML-C.mp3" },
            { text: "ולומדת לעשות פיפי וקקי בסיר כמו ילדה גדולה!", image: "https://github.com/nagawoker11-code/mylee/blob/main/ML-5.jpeg?raw=true", audio: "ML-D.mp3" },
            { text: "עכשיו אני אומרת ביי ביי לחיתול ולובשת תחתונים", image: "https://github.com/nagawoker11-code/mylee/blob/main/WhatsApp%20Image%202026-04-19%20at%2012.20.00%20(2).jpeg?raw=true", audio: "ML-E.mp3" },
            { text: "כשלוחץ לי בבטן ואני מרגישה שאני צריכה לעשות פיפי או קקי אני יושבת בסיר", image: "https://github.com/nagawoker11-code/mylee/blob/main/ML-5.jpeg?raw=true", audio: "ML-F.mp3" },
            { text: "אני יושבת בסיר ומחכה, לפעמים אני קוראת ספר", image: "https://github.com/nagawoker11-code/mylee/blob/main/ML-1.jpeg?raw=true", audio: "ML-G.mp3" },
            { text: "לפעמים יוצא פיפי או קקי בסיר ולפעמים אין פיפי ואין קקי", image: "https://github.com/nagawoker11-code/mylee/blob/main/ML-5.jpeg?raw=true", audio: "ML-H.mp3" },
            { text: "אני שוטפת ידיים עם מים וסבון וחוזרת לשחק", image: "https://github.com/nagawoker11-code/mylee/blob/main/ML-6.jpeg?raw=true", audio: "ML-I.mp3" },
            { text: "כיף להיות ילדה גדולה", image: "https://github.com/nagawoker11-code/mylee/blob/main/ML-2.jpeg?raw=true", audio: "ML-J.mp3", isLast: true }
        ];

        let currentPage = 0;
        const bookEl = document.getElementById('book');
        const progressEl = document.getElementById('progressContainer');
        const audioPlayer = document.getElementById('audioPlayer');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        function initBook() {
            bookEl.innerHTML = '';
            progressEl.innerHTML = '';

            bookData.forEach((data, index) => {
                const page = document.createElement('div');
                page.className = `page page-${index}`;
                page.style.zIndex = bookData.length - index;
                
                let content = `
                    <div class="text-container">
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 leading-snug">${data.text}</h2>
                    </div>
                    <div class="image-frame">
                        <img src="${data.image}" alt="${data.text}" class="page-image">
                    </div>
                `;

                if (data.isLast) {
                    content += `
                        <button onclick="restartBook()" class="mt-4 py-3 px-8 bg-indigo-600 text-white rounded-full font-bold shadow-lg active:scale-95 transition-all text-lg">
                            להתחיל מחדש
                        </button>
                    `;
                }

                page.innerHTML = content;
                bookEl.appendChild(page);

                const dot = document.createElement('div');
                dot.className = `progress-dot ${index === 0 ? 'active' : ''}`;
                progressEl.appendChild(dot);
            });

            updateNavigation();
        }

        function flipPage(direction) {
            if (direction === 'next' && currentPage < bookData.length - 1) {
                const page = document.querySelector(`.page-${currentPage}`);
                page.classList.add('flipped');
                currentPage++;
                playNarration();
            } else if (direction === 'prev' && currentPage > 0) {
                currentPage--;
                const page = document.querySelector(`.page-${currentPage}`);
                page.classList.remove('flipped');
                playNarration();
            }
            updateNavigation();
        }

        function updateNavigation() {
            prevBtn.classList.toggle('opacity-30', currentPage === 0);
            prevBtn.classList.toggle('pointer-events-none', currentPage === 0);
            nextBtn.classList.toggle('opacity-30', currentPage === bookData.length - 1);
            nextBtn.classList.toggle('pointer-events-none', currentPage === bookData.length - 1);

            document.querySelectorAll('.progress-dot').forEach((dot, idx) => {
                dot.classList.toggle('active', idx === currentPage);
            });
        }

        function playNarration() {
            const data = bookData[currentPage];
            audioPlayer.pause();
            if (data.audio) {
                audioPlayer.src = audioBase + data.audio;
                audioPlayer.play().catch(() => console.log("Audio waiting for user touch..."));
            }
        }

        function restartBook() {
            currentPage = 0;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('flipped'));
            updateNavigation();
            audioPlayer.pause();
        }

        nextBtn.addEventListener('click', (e) => { e.preventDefault(); flipPage('next'); });
        prevBtn.addEventListener('click', (e) => { e.preventDefault(); flipPage('prev'); });

        let startX = 0;
        document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;
            if (diff > 60) flipPage('next');
            if (diff < -60) flipPage('prev');
        }, {passive: true});

        document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        window.onload = initBook;
    </script>
</body>
</html>
